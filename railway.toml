# Railway deploy konfiguratsiyasi
# https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"

[deploy]
# yt-dlp/Network xatolarida avtomatik qayta boshlash
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
# Polling rejimi uchun healthcheck HTTP endpoint kerak emas.
# Agar webhook rejimiga o'tsangiz, healthcheckPath = "/" qo'shing.
